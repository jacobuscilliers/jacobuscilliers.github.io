baseURL = 'https://jacobuscilliers.github.io/'
languageCode = 'en-us'
title = "Jacobus Cilliers"
theme = 'ananke'

[params]
  description = "Economist at Georgetown University. Research on human capital and public service delivery in Africa."
  background_color_class = "bg-near-black"
  show_reading_time = true
  custom_css = ["css/custom.css"]
  featured_image = "/images/cape-town-banner.jpg"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menus]
  [[menus.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menus.main]]
    name = "Research"
    url = "/research/"
    weight = 2
  [[menus.main]]
    name = "Capstone"
    url = "/capstone/"
    weight = 3
  [[menus.main]]
    name = "Blog"
    url = "/posts/"
    weight = 4
