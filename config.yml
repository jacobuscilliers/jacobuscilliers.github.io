          title: Jacobus Cilliers
          subtitle: "I am an economist at the McCourt School of Public Policy at Georgetown University, and an affiliate with [gui2de](https://gui2de.georgetown.edu/) and the [Jameel Poverty Action Lab](https://www.povertyactionlab.org/). My research uses experimental and quasi-experimental methods to study human capital and public service delivery. Ongoing work includes estimating the effects of climate shocks on student outcomes, and a long-run follow-up tracking students a decade after an early-grade reading intervention.\n\nPrior to Georgetown, I was a Post-Doctoral Research Fellow at the Blavatnik School of Government (University of Oxford) and a consultant to the World Bank's Education Global Practice, where I continue to lead evaluations. I completed my MPhil (distinction) and DPhil in Economics at Oxford as a Rhodes Scholar. I am a South African citizen.\n\n**Email:** ejc93[at]georgetown[dot]edu\n\n[Google Scholar](https://scholar.google.co.za/citations?user=Xked6FoAAAAJ&hl=en) | [CV](https://www.dropbox.com/scl/fi/2e74rqvizf70wntkjmubq/Cilliers-CV-May-2025.pdf)"
